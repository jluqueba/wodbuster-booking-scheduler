target-version = "py312"
line-length = 100
src = ["src", "tests"]
extend-exclude = [
    "docs",
    ".venv",
    "build",
    "dist",
]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "C4",   # flake8-comprehensions
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line length is enforced by formatter
]

[lint.per-file-ignores]
"tests/**" = ["B011"]
# Catalog holds UI copy with emoji; RUF001 flags ambiguous unicode
# characters that are deliberate in user-facing strings.
"src/wodbuster_worker/i18n/catalog.py" = ["RUF001"]
