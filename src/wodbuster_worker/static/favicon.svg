<?xml version="1.0" encoding="UTF-8"?>
<!--
  WodBuster Booking Scheduler favicon.

  Concept: a stylised barbell + the "WB" wordmark in the app's
  yellow accent (#f8ff40) on a near-black backdrop that matches the
  dark UI. Vector so it stays crisp on any DPR / mobile PWA icon.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded dark tile. -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#0a0e14"/>
  <!-- Barbell: two plates + a bar. -->
  <g fill="#f8ff40">
    <!-- Left plate (tall). -->
    <rect x="6"  y="18" width="6" height="28" rx="2"/>
    <!-- Left inner plate. -->
    <rect x="14" y="22" width="4" height="20" rx="1.5"/>
    <!-- Bar. -->
    <rect x="18" y="30" width="28" height="4" rx="1"/>
    <!-- Right inner plate. -->
    <rect x="46" y="22" width="4" height="20" rx="1.5"/>
    <!-- Right plate (tall). -->
    <rect x="52" y="18" width="6" height="28" rx="2"/>
  </g>
  <!-- Small "WB" label under the bar, monospace-ish. -->
  <text
    x="32" y="58"
    text-anchor="middle"
    font-family="ui-monospace, 'Cascadia Mono', 'Consolas', monospace"
    font-size="10"
    font-weight="700"
    fill="#f8ff40"
    letter-spacing="1"
  >WB</text>
</svg>
