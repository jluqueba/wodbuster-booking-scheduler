name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect non-documentation changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # `code` is true when the change set touches anything that is
          # not a Markdown file. Documentation-only changes (README or
          # docs/*.md edits) leave it false so the lint+type+test job
          # below is skipped. The ci-gate job still reports a result so
          # the branch ruleset's required check is satisfied.
          filters: |
            code:
              - '**'
              - '!**/*.md'

  check:
    name: ruff, mypy, pytest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      # Postgres 16 service container: matches the local docker-compose
      # setup (F1.7) and the prod SKU (F3.11). Component tests in
      # tests/component/test_migrations.py connect here to exercise the
      # real Alembic baseline against a real Postgres.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wodbuster
          POSTGRES_PASSWORD: wodbuster
          POSTGRES_DB: wodbuster
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wodbuster -d wodbuster"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: wodbuster
      POSTGRES_USER: wodbuster
      POSTGRES_PASSWORD: wodbuster
      WODBUSTER_ENV: local

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff
        run: ruff check .

      - name: mypy
        run: mypy src

      - name: pytest
        run: pytest -m "not live_contract"

  ci-gate:
    # Single required status check for the `main` branch ruleset. It
    # always runs (even when `check` is skipped for docs-only changes),
    # so the required check is never left pending. It passes when the
    # heavy job succeeded or was intentionally skipped, and fails only
    # when the heavy job actually failed or was cancelled.
    name: ci-gate
    needs: [changes, check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate the check job result
        env:
          CHECK_RESULT: ${{ needs.check.result }}
        run: |
          echo "check job result: ${CHECK_RESULT}"
          if [ "${CHECK_RESULT}" = "success" ] || [ "${CHECK_RESULT}" = "skipped" ]; then
            echo "CI gate passed."
            exit 0
          fi
          echo "CI gate failed: the check job did not succeed."
          exit 1
