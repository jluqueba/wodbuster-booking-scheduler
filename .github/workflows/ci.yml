name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ruff, mypy, pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      # Postgres 16 service container: matches the local docker-compose
      # setup (F1.7) and the prod SKU (F3.11). Component tests in
      # tests/component/test_migrations.py connect here to exercise the
      # real Alembic baseline against a real Postgres.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wodbuster
          POSTGRES_PASSWORD: wodbuster
          POSTGRES_DB: wodbuster
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wodbuster -d wodbuster"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: wodbuster
      POSTGRES_USER: wodbuster
      POSTGRES_PASSWORD: wodbuster
      WODBUSTER_ENV: local

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff
        run: ruff check .

      - name: mypy
        run: mypy src

      - name: pytest
        run: pytest -m "not live_contract"
