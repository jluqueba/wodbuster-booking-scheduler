# Infrastructure provisioning workflow (F2.3, ADR-0007).
#
# Runs `azd provision` against the `prod` environment whenever infra code or
# `azure.yaml` changes on `main`, and on manual dispatch. There is no approval
# gate for MVP (see reasoning-log.md 2026-07-02, Q3=b). Authenticates via OIDC
# against the deploy user-assigned managed identity (ADR-0005). Container image
# deployment is handled by a separate workflow (F2.2).

name: infra

on:
  push:
    branches: [main]
    paths:
      - infra/**
      - azure.yaml
  workflow_dispatch:

concurrency:
  group: infra-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    name: azd provision (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AZURE_ENV_NAME: prod
      AZURE_LOCATION: spaincentral
      AZURE_RESOURCE_GROUP: rg-prod-yrv2tv7mfjvma
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      # Do NOT set AZURE_PRINCIPAL_ID: azd overwrites it with the OIDC caller
      # (the deploy UAMI, ServicePrincipal type), which then fails the
      # keyvault.bicep operator role assignment that expects principalType: 'User'.
      # Use AZURE_OPERATOR_PRINCIPAL_ID (mapped in main.parameters.json).
      AZURE_OPERATOR_PRINCIPAL_ID: ${{ vars.AZURE_OPERATOR_PRINCIPAL_ID }}
      # F3.11 additions: needed by main.parameters.json for the Postgres module
      # and the keyvault deploy-UAMI Secrets User role assignment.
      AZURE_OPERATOR_PRINCIPAL_UPN: ${{ vars.AZURE_OPERATOR_PRINCIPAL_UPN }}
      AZURE_DEPLOY_PRINCIPAL_ID: ${{ vars.AZURE_DEPLOY_PRINCIPAL_ID }}
      # OAuth 2.0 client IDs (non-secret, published as repo variables).
      # Consumed by containerapp.bicep as env vars on the running container.
      OAUTH_MICROSOFT_CLIENT_ID: ${{ vars.OAUTH_MICROSOFT_CLIENT_ID }}
      OAUTH_GITHUB_CLIENT_ID: ${{ vars.OAUTH_GITHUB_CLIENT_ID }}
      OAUTH_GOOGLE_CLIENT_ID: ${{ vars.OAUTH_GOOGLE_CLIENT_ID }}
      # WodBuster tenant coordinates (US-003, non-secret). When either
      # is empty the /cookie route returns 503; the container still boots.
      WODBUSTER_GYM: ${{ vars.WODBUSTER_GYM }}
      WODBUSTER_IDU: ${{ vars.WODBUSTER_IDU }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: azd auth login (OIDC)
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider github \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: Preserve currently-deployed image (F3.15)
        # Prior to F3.15, running `azd provision` without a SERVICE_WORKER_IMAGE_NAME
        # value caused Bicep to re-apply the module default (hello-world) and revert
        # whatever tag `azd deploy` (or the F2.2 deploy workflow) had last pushed.
        # Read the image tag currently running on the worker Container App and
        # export it so main.parameters.json's SERVICE_WORKER_IMAGE_NAME binding
        # picks it up. Silent no-op on the very first bootstrap when the app
        # does not yet exist.
        run: |
          set -euo pipefail
          CURRENT_IMAGE=$(az containerapp list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "[?tags.\"azd-service-name\"=='worker'] | [0].properties.template.containers[0].image" \
            -o tsv 2>/dev/null || true)
          if [ -n "${CURRENT_IMAGE}" ] && [ "${CURRENT_IMAGE}" != "null" ]; then
            echo "Preserving image: ${CURRENT_IMAGE}"
            echo "SERVICE_WORKER_IMAGE_NAME=${CURRENT_IMAGE}" >> "${GITHUB_ENV}"
          else
            echo "No existing worker Container App found; Bicep will use the hello-world bootstrap image."
          fi

      - name: azd provision
        run: azd provision --no-prompt
