# Application deployment workflow (F2.2, ADR-0001, ADR-0005, ADR-0007).
#
# Builds the worker container image from the repo `Dockerfile`, pushes it to
# ACR, and updates the single Container App revision via `azd deploy`. Runs
# only AFTER the `ci` workflow finishes successfully on `main` (so a red CI
# blocks the deploy instead of racing it), and on manual dispatch. Because a
# `workflow_run` trigger cannot carry path filters, the `gate` job below
# re-applies the original app-code filter (`src/**` / `Dockerfile`) before the
# deploy runs. This workflow deploys app code only; infrastructure changes are
# handled by `infra.yml` (F2.3). Authenticates via OIDC against the deploy
# user-assigned managed identity (ADR-0005). No client secrets in GitHub.

name: deploy

on:
  # Gate the deploy on CI: fire only when the `ci` workflow completes, then
  # check its conclusion in the `gate` job. A failed CI run therefore never
  # produces a deploy. `workflow_dispatch` still allows a manual deploy.
  workflow_run:
    workflows: [ci]
    types: [completed]
  workflow_dispatch:

concurrency:
  # Serialize deploys but do not cancel in progress: interrupting a partial
  # revision rollout can leave the Container App in an inconsistent state.
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  gate:
    # Decide whether a deploy should happen. Runs only for a manual dispatch
    # or a successful `ci` run that was itself a push to `main`; PR CI runs and
    # failed runs are filtered out here. The step then re-applies the app-code
    # path filter that `workflow_run` cannot express.
    name: gate (ci success + app code changed)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Check out the exact commit CI validated, with its parent, so the
          # path-filter diff below can see what that commit changed.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 2

      - name: Decide whether app code changed
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # A manual dispatch always deploys, regardless of what changed.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Preserve the original trigger's path filter: deploy only when app
          # code or the Dockerfile changed in the validated commit. Squash and
          # merge (the repo's merge strategy) lands one commit on main, so
          # HEAD^..HEAD is the full change set.
          if git diff --name-only HEAD^ HEAD | grep -Eq '^(src/|Dockerfile)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: azd deploy worker (prod)
    needs: gate
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      AZURE_ENV_NAME: prod
      AZURE_LOCATION: spaincentral
      AZURE_RESOURCE_GROUP: rg-prod-yrv2tv7mfjvma
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      # Do NOT set AZURE_PRINCIPAL_ID: azd overwrites it with the OIDC caller
      # (the deploy UAMI, ServicePrincipal type), which then fails the
      # keyvault.bicep operator role assignment that expects principalType:
      # 'User'. Use AZURE_OPERATOR_PRINCIPAL_ID (mapped in main.parameters.json).
      AZURE_OPERATOR_PRINCIPAL_ID: ${{ vars.AZURE_OPERATOR_PRINCIPAL_ID }}
      # F3.11 additions: not strictly needed by `azd deploy` (which reads outputs
      # via `azd env refresh`), but kept in sync with infra.yml so a stray
      # provision call from the same env block doesn't fail with unbound params.
      AZURE_OPERATOR_PRINCIPAL_UPN: ${{ vars.AZURE_OPERATOR_PRINCIPAL_UPN }}
      AZURE_DEPLOY_PRINCIPAL_ID: ${{ vars.AZURE_DEPLOY_PRINCIPAL_ID }}
      # OAuth client IDs mirrored from infra.yml so a stray provision
      # call from the same env block does not fail with unbound params.
      OAUTH_MICROSOFT_CLIENT_ID: ${{ vars.OAUTH_MICROSOFT_CLIENT_ID }}
      OAUTH_GITHUB_CLIENT_ID: ${{ vars.OAUTH_GITHUB_CLIENT_ID }}
      OAUTH_GOOGLE_CLIENT_ID: ${{ vars.OAUTH_GOOGLE_CLIENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Deploy the exact commit CI validated (for workflow_run); falls back
          # to the ref for a manual dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: azd auth login (OIDC)
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider github \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: ACR login
        # Explicit `az acr login` so a token/permission failure surfaces here
        # rather than inside `azd deploy`'s docker push. `azd deploy` would
        # otherwise handle this transparently.
        run: az acr login --name cryrv2tv7mfjvma

      - name: azd env refresh
        # Pull the current provisioning outputs (registry endpoint, container
        # app name, key vault URI, etc.) into the ephemeral azd env so that
        # `azd deploy` knows where to push the image and which revision to
        # roll. Without this step, azd fails with "could not determine
        # container registry endpoint" because the runner has no `.azure/`
        # state cached from a previous provision.
        run: azd env refresh --no-prompt

      - name: azd deploy worker
        # Builds the image locally from the repo Dockerfile, pushes it to ACR,
        # and updates the Container App revision to the new tag. Does NOT run
        # `azd provision`; infra provisioning belongs to F2.3. Requires the
        # Container App and ACR to already exist.
        run: azd deploy worker --no-prompt
